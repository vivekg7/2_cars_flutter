name: two_cars_flutter
description: "2 Cars arcade game using flutter and flame engine."

publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.2
  flame: ^1.33.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:

  uses-material-design: true

  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  web:
    generate: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter_native_splash:
  color: "#1a1a2e"
  color_dark: "#1a1a2e"
  image: "assets/app_icon.png"
  image_dark: "assets/app_icon.png"
  android: true
  ios: true
  web: true
  android_12:
    color: "#1a1a2e"
    color_dark: "#1a1a2e"
